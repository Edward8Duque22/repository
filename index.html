<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Repositorio Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>🌟 Mis Creaciones</h1>
        <p>Explora mi archivo personal organizado por fechas</p>
    </header>

    <div class="container">
        <main class="grid" id="visor-publico"></main>
    </div>

    <a href="login.html" style="position: fixed; bottom: 20px; right: 20px; text-decoration: none; opacity: 0.3;">⚙️</a>

    <script src="script.js"></script>
    <script>
        const visor = document.getElementById('visor-publico');
        const proyectos = obtenerProyectos();

        // Filtrar visibles y ordenar por fecha (más reciente arriba)
        proyectos.filter(p => p.visible)
            .sort((a,b) => new Date(b.fecha) - new Date(a.fecha))
            .forEach(p => {
                visor.innerHTML += `
                    <div class="card">
                        <img src="${p.img}">
                        <div class="card-body">
                            <span class="badge">📅 ${p.fecha}</span>
                            <h3 style="margin: 15px 0 10px;">${p.titulo}</h3>
                            <p style="color:#636e72; font-size:0.9rem; margin-bottom:20px;">${p.desc}</p>
                            <div style="display:flex;">
                                <a href="${p.repo}" target="_blank" class="btn btn-repo">📁 Archivo</a>
                                <a href="${p.live}" target="_blank" class="btn btn-live">🚀 Ver Proyecto</a>
                            </div>
                        </div>
                    </div>`;
            });
    </script>
</body>
</html>
