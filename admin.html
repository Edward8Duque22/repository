<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrador - Mi Repo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script>verificarSesion();</script>
</head>
<body>
    <header>
        <button onclick="sessionStorage.clear(); location.reload();" style="float: right; padding: 10px; border-radius: 10px; border: none; cursor: pointer;">Cerrar 🔓</button>
        <h1>🛠 Gestionar Archivo</h1>
    </header>

    <div class="container">
        <div class="box-form">
            <input type="text" id="titulo" placeholder="Título del proyecto">
            <input type="date" id="fecha">
            <label style="font-size: 0.8rem; color: var(--primary);">Portada (Foto Local):</label>
            <input type="file" id="foto-local" accept="image/*">
            <input type="text" id="url-repo" placeholder="Link Repositorio (GitHub/Drive)">
            <input type="text" id="url-live" placeholder="Link en la Nube (Demo)">
            <textarea id="descripcion" placeholder="Descripción breve..."></textarea>
            <button class="btn btn-live" style="width: 100%;" onclick="procesarNuevoProyecto()">🚀 Publicar Ahora</button>
        </div>

        <h2 style="text-align: center;">Tus Publicaciones</h2>
        <div id="lista-admin" class="grid" style="margin-top: 20px;"></div>
    </div>

    <script>
        const lista = document.getElementById('lista-admin');
        const proyectos = obtenerProyectos();

        function toggle(id) {
            const db = obtenerProyectos().map(p => {
                if(p.id === id) p.visible = !p.visible;
                return p;
            });
            guardarProyectos(db);
            location.reload();
        }

        function borrar(id) {
            if(confirm("¿Borrar permanentemente?")) {
                const db = obtenerProyectos().filter(p => p.id !== id);
                guardarProyectos(db);
                location.reload();
            }
        }

        proyectos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).forEach(p => {
            lista.innerHTML += `
                <div class="card" style="opacity: ${p.visible ? '1' : '0.5'}">
                    <img src="${p.img}">
                    <div class="card-body">
                        <h3>${p.titulo}</h3>
                        <button onclick="toggle(${p.id})">${p.visible ? 'Ocultar 👁️' : 'Mostrar 🕶️'}</button>
                        <button onclick="borrar(${p.id})" style="color:red; margin-left:10px;">Borrar 🗑️</button>
                    </div>
                </div>`;
        });
    </script>
</body>
</html>
