<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script>if(!sessionStorage.getItem('sesion_activa')) window.location.href='login.html';</script>
</head>
<body>
    <header>
        <button onclick="sessionStorage.clear(); window.location.href='index.html';" style="float:right; padding:10px; border-radius:10px; cursor:pointer; border:none;">Salir 🔓</button>
        <h1>🛠 Administrar Repositorio</h1>
    </header>

    <div class="container">
        <div class="box-form">
            <h3>Subir Nuevo Archivo</h3>
            <input type="text" id="titulo" placeholder="Título del proyecto">
            <input type="date" id="fecha">
            <label style="font-size:0.8rem; color:var(--primary);">Imagen Portada:</label>
            <input type="file" id="foto" accept="image/*">
            <input type="text" id="repo" placeholder="Link Repositorio">
            <input type="text" id="live" placeholder="Link Demo">
            <textarea id="desc" placeholder="Descripción breve..."></textarea>
            <button class="btn btn-live" style="width:100%;" onclick="agregarProyecto()">🚀 Publicar Ahora</button>
        </div>

        <h2 style="text-align:center;">Gestionar Publicaciones</h2>
        <div id="lista-admin" class="grid"></div>
    </div>

    <script>
        function cargarAdmin() {
            const lista = document.getElementById('lista-admin');
            const proyectos = obtenerProyectos().sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
            lista.innerHTML = '';
            proyectos.forEach(p => {
                lista.innerHTML += `
                    <div class="card" style="opacity:${p.visible ? '1' : '0.5'}">
                        <img src="${p.img}">
                        <div class="card-body">
                            <h4>${p.titulo}</h4>
                            <button onclick="toggleVisible(${p.id})">${p.visible ? 'Ocultar 👁️' : 'Mostrar 🕶️'}</button>
                            <button onclick="eliminarProyecto(${p.id})" style="color:red; margin-left:10px; border:none; background:none; cursor:pointer;">Borrar 🗑️</button>
                        </div>
                    </div>`;
            });
        }
        document.addEventListener('DOMContentLoaded', cargarAdmin);
    </script>
</body>
</html>
