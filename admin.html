<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <a href="index.html" style="float: left; color: white; text-decoration: none;">⬅ Volver</a>
        <h1>🛠 Gestionar Repositorio</h1>
    </header>

    <section class="form-container">
        <div class="form-group">
            <input type="text" id="titulo" placeholder="Título del proyecto">
            <input type="date" id="fecha">
            <label>Imagen de portada (Local):</label>
            <input type="file" id="foto" accept="image/*">
            <input type="text" id="repo" placeholder="URL del Repositorio (GitHub/Drive)">
            <input type="text" id="live" placeholder="URL del Proyecto (Nube)">
            <textarea id="desc" placeholder="Descripción del proyecto..."></textarea>
            <button class="btn-main" onclick="agregarProyecto()">🚀 Publicar en el Archivo</button>
        </div>
    </section>

    <h2 style="text-align: center;">Tus Publicaciones</h2>
    <div id="lista-admin" class="grid"></div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const datos = obtenerDatos();
            const lista = document.getElementById('lista-admin');
            
            datos.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).forEach(p => {
                lista.innerHTML += `
                    <div class="card ${p.visible ? '' : 'hidden-card'}">
                        <img src="${p.img}">
                        <div class="card-body">
                            <h3>${p.titulo}</h3>
                            <div class="admin-actions">
                                <button class="btn-toggle" onclick="toggleVisible(${p.id})">${p.visible ? 'Ocultar 👁️' : 'Mostrar 🕶️'}</button>
                                <button class="btn-delete" onclick="eliminar(${p.id})">Borrar 🗑️</button>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
