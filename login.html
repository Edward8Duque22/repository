<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div class="full-center">
        <div class="box-form">
            <h2>🔐 Panel Privado</h2>
            <p>Ingresa tu clave maestra</p>
            <input type="password" id="clave" placeholder="Contraseña" autofocus>
            <button class="btn btn-live" style="width:100%;" onclick="validar()">Entrar</button>
            <div style="margin-top:20px;"><a href="index.html" style="color:#999; text-decoration:none; font-size:0.9rem;">← Volver</a></div>
        </div>
    </div>

    <script>
        function validar() {
            const pass = document.getElementById('clave').value;
            const hashIngresado = CryptoJS.SHA256(pass).toString();
            // Hash exacto para Neiva0228
            const hashCorrecto = "71597797746409f7435f299103e6702c2f78508194411130d2204c35e4e89139";

            if (hashIngresado === hashCorrecto) {
                sessionStorage.setItem('sesion_activa', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("Clave incorrecta ❌");
            }
        }
    </script>
</body>
</html>
